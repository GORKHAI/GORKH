name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.context.outputs.channel }}
      version: ${{ steps.context.outputs.version }}
      prerelease: ${{ steps.context.outputs.prerelease }}
      updater_enabled: ${{ steps.context.outputs.updater_enabled }}
      release_name: ${{ steps.context.outputs.release_name }}
      release_label: ${{ steps.context.outputs.release_label }}
      trust_status: ${{ steps.context.outputs.trust_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate checked-in version sync
        run: node scripts/version-check.mjs

      - name: Resolve release context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          RAW_REF="${GITHUB_REF_NAME:-}"
          EVENT_NAME="${GITHUB_EVENT_NAME}"
          INPUT_CHANNEL="${{ github.event.inputs.channel }}"
          CHECKED_IN_VERSION="$(tr -d '\n' < VERSION)"

          if [[ -z "$CHECKED_IN_VERSION" ]]; then
            echo "::error::VERSION file is empty."
            exit 1
          fi

          if [[ "$EVENT_NAME" == "push" ]]; then
            if [[ "$RAW_REF" =~ ^v.+-beta\.[0-9]+$ ]]; then
              CHANNEL="beta"
            elif [[ "$RAW_REF" =~ ^v.+$ ]]; then
              CHANNEL="stable"
            else
              echo "::error::Unsupported release tag '$RAW_REF'. Use vX.Y.Z for stable or vX.Y.Z-beta.N for beta."
              exit 1
            fi
            TAG_VERSION="${RAW_REF#v}"
            if [[ "$TAG_VERSION" != "$CHECKED_IN_VERSION" ]]; then
              echo "::error::Pushed tag '$RAW_REF' does not match checked-in VERSION '$CHECKED_IN_VERSION'. Update VERSION and synced package metadata before tagging."
              exit 1
            fi
            VERSION="$CHECKED_IN_VERSION"
          else
            CHANNEL="${INPUT_CHANNEL:-beta}"
            VERSION="$CHECKED_IN_VERSION"
          fi

          if [[ "$CHANNEL" == "stable" && "$VERSION" == *"-beta."* ]]; then
            echo "::error::Stable releases cannot use beta version strings ($VERSION)."
            exit 1
          fi

          if [[ "$CHANNEL" == "beta" && "$EVENT_NAME" == "push" && "$VERSION" != *"-beta."* ]]; then
            echo "::error::Beta release tags must use the vX.Y.Z-beta.N format."
            exit 1
          fi

          if [[ "$CHANNEL" == "stable" ]]; then
            PRERELEASE="false"
            UPDATER_ENABLED="true"
            RELEASE_LABEL="MACOS-SIGNED STABLE"
            TRUST_STATUS="macOS Developer ID signed and notarized; Windows artifacts intentionally omitted"
            RELEASE_NAME="GORKH Desktop v${VERSION}"
          else
            PRERELEASE="true"
            UPDATER_ENABLED="false"
            RELEASE_LABEL="MACOS-SIGNED BETA"
            TRUST_STATUS="macOS Developer ID signed and notarized; Windows beta artifacts unsigned"
            RELEASE_NAME="GORKH Desktop v${VERSION} (beta)"
          fi

          printf 'channel=%s\n' "$CHANNEL" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'prerelease=%s\n' "$PRERELEASE" >> "$GITHUB_OUTPUT"
          printf 'updater_enabled=%s\n' "$UPDATER_ENABLED" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          printf 'release_label=%s\n' "$RELEASE_LABEL" >> "$GITHUB_OUTPUT"
          printf 'trust_status=%s\n' "$TRUST_STATUS" >> "$GITHUB_OUTPUT"

      - name: Validate desktop API runtime variables
        shell: bash
        env:
          VITE_API_HTTP_BASE: ${{ vars.VITE_API_HTTP_BASE }}
          VITE_API_WS_URL: ${{ vars.VITE_API_WS_URL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const httpBase = process.env.VITE_API_HTTP_BASE?.trim() ?? '';
          const wsUrl = process.env.VITE_API_WS_URL?.trim() ?? '';
          const appBaseUrl = process.env.APP_BASE_URL?.trim() ?? '';

          const fail = (message) => {
            console.error(`::error::${message}`);
            process.exit(1);
          };

          if (!httpBase) {
            fail('Desktop packaged builds require the VITE_API_HTTP_BASE GitHub Actions variable.');
          }

          if (!wsUrl) {
            fail('Desktop packaged builds require the VITE_API_WS_URL GitHub Actions variable.');
          }

          if (!appBaseUrl) {
            fail('Desktop packaged builds require the APP_BASE_URL GitHub Actions variable (the web portal URL, used to allowlist the browser sign-in redirect).');
          }

          let http;
          let ws;
          let appBase;

          try {
            http = new URL(httpBase);
          } catch {
            fail(`Desktop packaged builds require VITE_API_HTTP_BASE to be an absolute URL. Received: ${httpBase}`);
          }

          try {
            ws = new URL(wsUrl);
          } catch {
            fail(`Desktop packaged builds require VITE_API_WS_URL to be an absolute URL. Received: ${wsUrl}`);
          }

          try {
            appBase = new URL(appBaseUrl);
          } catch {
            fail(`Desktop packaged builds require APP_BASE_URL to be an absolute URL. Received: ${appBaseUrl}`);
          }

          if (http.protocol !== 'https:') {
            fail(`Desktop packaged builds require VITE_API_HTTP_BASE to use https://. Received: ${httpBase}`);
          }

          if (ws.protocol !== 'wss:') {
            fail(`Desktop packaged builds require VITE_API_WS_URL to use wss://. Received: ${wsUrl}`);
          }

          if (appBase.protocol !== 'https:') {
            fail(`Desktop packaged builds require APP_BASE_URL to use https://. Received: ${appBaseUrl}`);
          }

          const effectivePort = (url) =>
            url.port || (url.protocol === 'https:' || url.protocol === 'wss:' ? '443' : '80');

          if (http.hostname !== ws.hostname || effectivePort(http) !== effectivePort(ws)) {
            fail(`Desktop packaged builds require VITE_API_HTTP_BASE and VITE_API_WS_URL to target the same host and port. Received: ${httpBase} / ${wsUrl}`);
          }

          console.log(`Validated packaged desktop API host ${http.host}`);
          console.log(`Validated packaged desktop web portal host ${appBase.host}`);
          NODE

      - name: Validate stable signing and notarization secrets
        if: steps.context.outputs.channel == 'stable'
        shell: bash
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          VITE_DESKTOP_UPDATER_PUBLIC_KEY: ${{ vars.VITE_DESKTOP_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          missing=()
          required=(
            TAURI_PRIVATE_KEY
            TAURI_KEY_PASSWORD
            MACOS_CERT_P12_BASE64
            MACOS_CERT_PASSWORD
            MACOS_KEYCHAIN_PASSWORD
          )

          for secret_name in "${required[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("$secret_name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Stable channel is missing required GitHub Actions secrets: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

          api_key_mode=true
          for secret_name in APPLE_API_KEY_ID APPLE_API_ISSUER_ID APPLE_API_KEY_P8_BASE64; do
            if [[ -z "${!secret_name:-}" ]]; then
              api_key_mode=false
              break
            fi
          done

          apple_id_mode=true
          for secret_name in APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              apple_id_mode=false
              break
            fi
          done

          if [[ "$api_key_mode" != "true" && "$apple_id_mode" != "true" ]]; then
            echo "::error::Stable channel requires notarization credentials. Provide either APPLE_API_KEY_ID + APPLE_API_ISSUER_ID + APPLE_API_KEY_P8_BASE64 or APPLE_ID + APPLE_TEAM_ID + APPLE_APP_SPECIFIC_PASSWORD."
            exit 1
          fi

          if [[ -z "${VITE_DESKTOP_UPDATER_PUBLIC_KEY:-}" ]]; then
            echo "::error::Stable channel requires the VITE_DESKTOP_UPDATER_PUBLIC_KEY GitHub Actions variable."
            exit 1
          fi

      - name: Validate beta macOS signing and notarization secrets
        if: steps.context.outputs.channel == 'beta'
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          required=(
            MACOS_CERT_P12_BASE64
            MACOS_CERT_PASSWORD
            MACOS_KEYCHAIN_PASSWORD
          )

          for secret_name in "${required[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("$secret_name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Beta macOS releases require GitHub Actions secrets: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

          api_key_mode=true
          for secret_name in APPLE_API_KEY_ID APPLE_API_ISSUER_ID APPLE_API_KEY_P8_BASE64; do
            if [[ -z "${!secret_name:-}" ]]; then
              api_key_mode=false
              break
            fi
          done

          apple_id_mode=true
          for secret_name in APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              apple_id_mode=false
              break
            fi
          done

          if [[ "$api_key_mode" != "true" && "$apple_id_mode" != "true" ]]; then
            echo "::error::Beta macOS releases require notarization credentials. Provide either APPLE_API_KEY_ID + APPLE_API_ISSUER_ID + APPLE_API_KEY_P8_BASE64 or APPLE_ID + APPLE_TEAM_ID + APPLE_APP_SPECIFIC_PASSWORD."
            exit 1
          fi

      - name: Generate packaged desktop validation report template
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-signoff
          node scripts/release/verify-packaged-desktop-report.mjs --template --channel "${{ steps.context.outputs.channel }}" --version "${{ steps.context.outputs.version }}" --machine macos-fill-me > "release-signoff/packaged-desktop-report-${{ steps.context.outputs.channel }}.template.json"

      - name: Upload packaged desktop validation template
        uses: actions/upload-artifact@v4
        with:
          name: packaged-desktop-validation-${{ steps.context.outputs.channel }}
          path: release-signoff/*

  build-windows:
    runs-on: windows-latest
    needs:
      - prepare
    env:
      VITE_API_HTTP_BASE: ${{ vars.VITE_API_HTTP_BASE }}
      VITE_API_WS_URL: ${{ vars.VITE_API_WS_URL }}
      VITE_DESKTOP_UPDATER_ENABLED: ${{ needs.prepare.outputs.updater_enabled }}
      VITE_DESKTOP_UPDATER_PUBLIC_KEY: ${{ vars.VITE_DESKTOP_UPDATER_PUBLIC_KEY }}
    steps:
      - name: Skip Windows bundle for stable channel
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        run: |
          set -euo pipefail
          echo "Stable channel currently publishes macOS artifacts only; skipping Windows build."

      - name: Checkout
        if: needs.prepare.outputs.channel != 'stable'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.prepare.outputs.channel != 'stable'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          cache: true

      - name: Setup Node.js
        if: needs.prepare.outputs.channel != 'stable'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        if: needs.prepare.outputs.channel != 'stable'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        if: needs.prepare.outputs.channel != 'stable'
        run: pnpm -r install --frozen-lockfile

      - name: Build shared package
        if: needs.prepare.outputs.channel != 'stable'
        run: pnpm --filter @gorkh/shared build

      - name: Write Windows Tauri release config
        if: needs.prepare.outputs.channel != 'stable'
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          set -euo pipefail

          CONFIG_PATH="$RUNNER_TEMP/windows-tauri-release-config.json"

          if [[ "$RELEASE_CHANNEL" == "stable" ]]; then
            if [[ -z "${VITE_API_HTTP_BASE:-}" ]]; then
              echo "::error::Stable desktop builds require the VITE_API_HTTP_BASE GitHub Actions variable."
              exit 1
            fi

            if [[ -z "${VITE_DESKTOP_UPDATER_PUBLIC_KEY:-}" ]]; then
              echo "::error::Stable desktop builds require the VITE_DESKTOP_UPDATER_PUBLIC_KEY GitHub Actions variable."
              exit 1
            fi

            ENDPOINT="${VITE_API_HTTP_BASE%/}/updates/desktop/{{target}}/{{arch}}/{{current_version}}.json"
            node -e "const fs=require('fs'); const configPath=process.argv[1]; const endpoint=process.argv[2]; const pubkey=process.env.VITE_DESKTOP_UPDATER_PUBLIC_KEY; const config={plugins:{updater:{active:true,dialog:true,pubkey,endpoints:[endpoint]}}}; fs.writeFileSync(configPath, JSON.stringify(config, null, 2));" "$CONFIG_PATH" "$ENDPOINT"
          else
            node -e "const fs=require('fs'); const configPath=process.argv[1]; const config={plugins:{updater:{active:false,dialog:true}}}; fs.writeFileSync(configPath, JSON.stringify(config, null, 2));" "$CONFIG_PATH"
          fi

          printf 'WINDOWS_TAURI_CONFIG=%s\n' "$CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Build Windows bundle
        if: needs.prepare.outputs.channel != 'stable'
        shell: bash
        run: pnpm --filter @gorkh/desktop tauri:build --config "$WINDOWS_TAURI_CONFIG" --bundles msi

      - name: Normalize Windows asset names
        if: needs.prepare.outputs.channel != 'stable'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $msiSource = Get-ChildItem -Path apps/desktop/src-tauri/target/release/bundle/msi -Filter *.msi -File -Recurse | Select-Object -First 1
          if (-not $msiSource) {
            Write-Error "Windows MSI bundle was not produced."
            exit 1
          }

          $normalizedAsset = "release-assets/GORKH_${env:RELEASE_VERSION}_windows_x86_64.msi"
          Copy-Item $msiSource.FullName $normalizedAsset -Force
          "WINDOWS_ASSET_PATH=$normalizedAsset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Assert beta artifacts do not contain updater signatures
        if: needs.prepare.outputs.channel != 'stable'
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem -Path release-assets -Filter *.sig -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sigFile) {
            Write-Error "Beta artifacts must not upload updater signatures."
            exit 1
          }

      - name: Upload Windows release artifacts
        if: needs.prepare.outputs.channel != 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-windows
          path: release-assets/*

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-14
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare
    env:
      VITE_API_HTTP_BASE: ${{ vars.VITE_API_HTTP_BASE }}
      VITE_API_WS_URL: ${{ vars.VITE_API_WS_URL }}
      VITE_DESKTOP_UPDATER_ENABLED: ${{ needs.prepare.outputs.updater_enabled }}
      VITE_DESKTOP_UPDATER_PUBLIC_KEY: ${{ vars.VITE_DESKTOP_UPDATER_PUBLIC_KEY }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install create-dmg for Tauri DMG bundling
        run: brew install create-dmg

      - name: Install dependencies
        run: pnpm -r install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @gorkh/shared build

      - name: Import Developer ID certificate into temporary keychain
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/macos-release-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ai-operator-release.keychain-db"

          printf '%s' "$MACOS_CERT_P12_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::Developer ID Application identity was not found in the temporary keychain."
            exit 1
          fi

          printf 'MACOS_SIGNING_IDENTITY=%s\n' "$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Write macOS Tauri release config
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          set -euo pipefail

          CONFIG_PATH="$RUNNER_TEMP/macos-tauri-release-config.json"

          if [[ -z "${MACOS_SIGNING_IDENTITY:-}" ]]; then
            echo "::error::macOS desktop builds require a resolved Developer ID signing identity."
            exit 1
          fi

          if [[ "$RELEASE_CHANNEL" == "stable" ]]; then
            if [[ -z "${VITE_API_HTTP_BASE:-}" ]]; then
              echo "::error::Stable desktop builds require the VITE_API_HTTP_BASE GitHub Actions variable."
              exit 1
            fi

            if [[ -z "${VITE_DESKTOP_UPDATER_PUBLIC_KEY:-}" ]]; then
              echo "::error::Stable desktop builds require the VITE_DESKTOP_UPDATER_PUBLIC_KEY GitHub Actions variable."
              exit 1
            fi

            ENDPOINT="${VITE_API_HTTP_BASE%/}/updates/desktop/{{target}}/{{arch}}/{{current_version}}.json"
            node -e "const fs=require('fs'); const configPath=process.argv[1]; const endpoint=process.argv[2]; const pubkey=process.env.VITE_DESKTOP_UPDATER_PUBLIC_KEY; const signingIdentity=process.env.MACOS_SIGNING_IDENTITY; const config={bundle:{macOS:{signingIdentity}},plugins:{updater:{active:true,dialog:false,pubkey,endpoints:[endpoint]}}}; fs.writeFileSync(configPath, JSON.stringify(config, null, 2));" "$CONFIG_PATH" "$ENDPOINT"
          else
            node -e "const fs=require('fs'); const configPath=process.argv[1]; const signingIdentity=process.env.MACOS_SIGNING_IDENTITY; const config={bundle:{macOS:{signingIdentity}},plugins:{updater:{active:false,dialog:false}}}; fs.writeFileSync(configPath, JSON.stringify(config, null, 2));" "$CONFIG_PATH"
          fi

          printf 'MACOS_TAURI_CONFIG=%s\n' "$CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Build macOS bundle
        shell: bash
        run: pnpm --filter @gorkh/desktop tauri:build --config "$MACOS_TAURI_CONFIG" --bundles app,dmg

      - name: Verify macOS app signature
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "::error::macOS app bundle was not produced."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Normalize macOS asset names
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          DMG_SOURCE="$(find apps/desktop/src-tauri/target/release/bundle/dmg -type f -name '*.dmg' | head -n 1)"
          if [[ -z "$DMG_SOURCE" ]]; then
            echo "::error::macOS DMG bundle was not produced."
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/release-assets"
          TARGET_NAME="$GITHUB_WORKSPACE/release-assets/GORKH_${RELEASE_VERSION}_macos_${RELEASE_ARCH}.dmg"
          cp "$DMG_SOURCE" "$TARGET_NAME"
          printf 'MACOS_ASSET_PATH=%s\n' "$TARGET_NAME" >> "$GITHUB_ENV"

      - name: Notarize and staple macOS artifact
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          hdiutil verify "$MACOS_ASSET_PATH"

          NOTARY_SUBMIT_JSON="$RUNNER_TEMP/notary-submit.json"
          NOTARY_INFO_JSON="$RUNNER_TEMP/notary-info.json"
          NOTARY_LOG_JSON="$RUNNER_TEMP/notary-log.json"

          if [[ -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER_ID:-}" && -n "${APPLE_API_KEY_P8_BASE64:-}" ]]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$API_KEY_PATH"
            xcrun notarytool submit "$MACOS_ASSET_PATH" --key "$API_KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID" --output-format json > "$NOTARY_SUBMIT_JSON"
          else
            xcrun notarytool submit "$MACOS_ASSET_PATH" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --output-format json > "$NOTARY_SUBMIT_JSON"
          fi

          NOTARY_SUBMISSION_ID="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); const id=payload.id || payload.submissionId || payload['submission-id']; if (!id) { process.exit(1); } process.stdout.write(String(id));" "$NOTARY_SUBMIT_JSON")"
          if [[ -z "$NOTARY_SUBMISSION_ID" ]]; then
            echo "::error::Failed to capture the notarization submission ID."
            cat "$NOTARY_SUBMIT_JSON"
            exit 1
          fi

          echo "NOTARY_SUBMISSION_ID=$NOTARY_SUBMISSION_ID"

          NOTARY_STATUS="In Progress"
          for attempt in {1..120}; do
            if [[ -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER_ID:-}" && -n "${APPLE_API_KEY_P8_BASE64:-}" ]]; then
              xcrun notarytool info "$NOTARY_SUBMISSION_ID" --key "$API_KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID" --output-format json > "$NOTARY_INFO_JSON"
            else
              xcrun notarytool info "$NOTARY_SUBMISSION_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --output-format json > "$NOTARY_INFO_JSON"
            fi

            NOTARY_STATUS="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(payload.status || payload.statusSummary || 'unknown'));" "$NOTARY_INFO_JSON")"
            echo "Current status [$attempt/120]: $NOTARY_STATUS"

            if [[ "$NOTARY_STATUS" == "Accepted" ]]; then
              break
            fi

            if [[ "$NOTARY_STATUS" == "Invalid" || "$NOTARY_STATUS" == "Rejected" ]]; then
              break
            fi

            sleep 30
          done

          if [[ -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER_ID:-}" && -n "${APPLE_API_KEY_P8_BASE64:-}" ]]; then
            xcrun notarytool log "$NOTARY_SUBMISSION_ID" --key "$API_KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID" "$NOTARY_LOG_JSON" || true
          else
            xcrun notarytool log "$NOTARY_SUBMISSION_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" "$NOTARY_LOG_JSON" || true
          fi

          if [[ "$NOTARY_STATUS" != "Accepted" ]]; then
            echo "::error::Notarization did not complete successfully for submission $NOTARY_SUBMISSION_ID (status: $NOTARY_STATUS)."
            [[ -f "$NOTARY_INFO_JSON" ]] && cat "$NOTARY_INFO_JSON"
            [[ -f "$NOTARY_LOG_JSON" ]] && cat "$NOTARY_LOG_JSON"
            exit 1
          fi

          xcrun stapler staple "$MACOS_ASSET_PATH"
          spctl -a -vv "$MACOS_ASSET_PATH" || spctl -a -t open --context context:primary-signature -vv "$MACOS_ASSET_PATH"

      - name: Generate stable updater signature for macOS artifact
        if: needs.prepare.outputs.channel == 'stable'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          pnpm --filter @gorkh/desktop exec tauri signer sign "$MACOS_ASSET_PATH"
          test -f "$MACOS_ASSET_PATH.sig"

      - name: Assert beta artifacts do not contain updater signatures
        if: needs.prepare.outputs.channel != 'stable'
        shell: bash
        run: |
          set -euo pipefail
          if find release-assets -type f -name '*.sig' | grep -q .; then
            echo "::error::Beta artifacts must not upload updater signatures."
            exit 1
          fi

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-macos-${{ matrix.arch }}
          path: release-assets/*

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-windows
      - build-macos
    permissions:
      contents: write
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
          RELEASE_LABEL: ${{ needs.prepare.outputs.release_label }}
          TRUST_STATUS: ${{ needs.prepare.outputs.trust_status }}
          UPDATER_ENABLED: ${{ needs.prepare.outputs.updater_enabled }}
        run: |
          set -euo pipefail

          if [[ "$UPDATER_ENABLED" == "true" ]]; then
            UPDATER_STATUS="enabled"
          else
            UPDATER_STATUS="disabled"
          fi

          cat > release-notes.md <<EOF
          Channel: ${RELEASE_CHANNEL}
          Release lane: ${RELEASE_LABEL}
          Artifact trust: ${TRUST_STATUS}
          Updater promotion: ${UPDATER_STATUS}
          EOF

          if [[ "$RELEASE_CHANNEL" == "beta" ]]; then
            cat >> release-notes.md <<'EOF'

          MACOS-SIGNED BETA

          This GitHub pre-release is for beta testing.
          macOS artifacts are Developer ID signed and notarized. Windows artifacts remain unsigned beta builds.
          Auto-update promotion is disabled and stable clients following DESKTOP_RELEASE_TAG=latest will ignore it by default.
          EOF
          else
            cat >> release-notes.md <<'EOF'

          Signed stable release.
          This stable lane currently publishes macOS artifacts only. Auto-update promotion is enabled only because the uploaded artifacts are signed, notarized where required, and accompanied by updater signatures generated after final packaging.
          Download the packaged-desktop-validation-stable workflow artifact and complete the stable macOS sign-off report before promotion.
          Stable macOS sign-off is required before promotion. Windows remains disabled for now.
          EOF
          fi

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: release-notes.md
          files: release-assets/*
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
