name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
          cache: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', 'apps/desktop/src-tauri/Cargo.lock', 'apps/desktop/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm -r install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @gorkh/shared build

      - name: Validate desktop security config
        run: pnpm check:desktop:security

      - name: Run desktop compile checks
        run: pnpm --filter @gorkh/desktop tauri:check

      - name: Audit Rust dependencies
        continue-on-error: true
        run: |
          cd apps/desktop/src-tauri
          cargo audit

  desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
          cache: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            apps\desktop\src-tauri\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', 'apps/desktop/src-tauri/Cargo.lock', 'apps/desktop/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm -r install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @gorkh/shared build

      - name: Validate desktop security config
        run: pnpm check:desktop:security

      - name: Run desktop compile checks
        run: pnpm --filter @gorkh/desktop tauri:check

      - name: Audit Rust dependencies
        continue-on-error: true
        shell: pwsh
        run: |
          cd apps/desktop/src-tauri
          cargo audit
