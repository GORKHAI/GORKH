name: App CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-and-smoke:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Lint
        run: pnpm -w lint

      - name: Build
        run: pnpm -w build

      - name: Test
        run: pnpm -w test

      - name: HTTP smoke
        run: bash scripts/smoke/httpSmoke.sh

      - name: WS smoke
        run: bash scripts/smoke/wsSmoke.sh
