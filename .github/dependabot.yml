# Dependabot configuration for automated dependency vulnerability scanning
# and update notifications. Keeps the repo secure with minimal maintenance.
#
# Features:
# - Weekly scans (reduces noise vs daily)
# - Grouped minor/patch updates (fewer PRs)
# - Separate groups for security updates (prioritized)
# - Covers both Node/pnpm and Rust/Cargo ecosystems

version: 2
updates:
  # Root package.json and workspace packages (pnpm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Group non-breaking updates to reduce PR noise
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Security updates are always separate and prioritized
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Desktop Tauri Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
